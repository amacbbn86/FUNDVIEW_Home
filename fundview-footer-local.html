<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FundView Footer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --fv-navy: #0a2e57;
      --fv-navy-deep: #071f3a;
      --fv-teal: #00b7b3;
      --fv-teal-bright: #00e5e0;
      --fv-gold: #f2b632;
      --fv-white: #ffffff;
      --fv-footer-muted: rgba(255, 255, 255, 0.72);
      --fv-footer-faint: rgba(255, 255, 255, 0.45);
      --fv-footer-line: rgba(255, 255, 255, 0.12);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
    }

    /* ============================================
       Global footer
       ============================================ */
    .site-footer {
      width: 100%;
      background:
        radial-gradient(ellipse 60% 80% at 12% 0%, rgba(0, 183, 179, 0.12), transparent 60%),
        linear-gradient(160deg, var(--fv-navy) 0%, var(--fv-navy-deep) 100%);
      color: var(--fv-white);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .site-footer__inner {
      width: min(1240px, 100%);
      margin: 0 auto;
      padding: clamp(3.25rem, 6vw, 5rem) 1.5rem clamp(1.5rem, 3vw, 2rem);
    }

    /* — Top: brand block + nav columns — */
    .site-footer__top {
      display: grid;
      grid-template-columns: minmax(260px, 1.1fr) minmax(0, 2fr);
      gap: clamp(2.5rem, 6vw, 5rem);
      align-items: start;
      padding-bottom: clamp(2.5rem, 5vw, 3.75rem);
    }

    .site-footer__brand {
      max-width: 360px;
    }

    .site-footer__logo {
      display: inline-block;
      line-height: 0;
    }

    .site-footer__logo img {
      display: block;
      width: min(100%, 260px);
      height: auto;
    }

    .site-footer__nav {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(1.5rem, 3vw, 2.5rem);
    }

    .site-footer__col-title {
      margin: 0 0 1.1rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--fv-footer-faint);
    }

    .site-footer__links {
      display: grid;
      gap: 0.7rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .site-footer__links a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--fv-footer-muted);
      text-decoration: none;
      transition: color 0.18s ease, transform 0.18s ease;
    }

    .site-footer__links a:hover,
    .site-footer__links a:focus-visible {
      color: var(--fv-teal-bright);
      transform: translateX(2px);
      outline: none;
    }

    .site-footer__links a svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: var(--fv-footer-faint);
      transition: color 0.18s ease;
    }

    .site-footer__links a:hover svg,
    .site-footer__links a:focus-visible svg {
      color: var(--fv-teal-bright);
    }

    /* — Big brand statement (inspired by the oversized-logo footers) — */
    .site-footer__statement {
      padding: clamp(2rem, 4.5vw, 3.25rem) 0;
      border-top: 1px solid var(--fv-footer-line);
      text-align: center;
    }

    .site-footer__statement-title {
      margin: 0;
      font-size: clamp(1.6rem, 3.4vw, 2.6rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--fv-white);
    }

    .site-footer__statement-highlight {
      position: relative;
      display: inline-block;
    }

    .site-footer__statement-highlight::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0.04em;
      height: 4px;
      background: var(--fv-gold);
    }

    /* — Bottom bar — */
    .site-footer__bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.25rem;
      flex-wrap: wrap;
      padding-top: clamp(1.25rem, 2.5vw, 1.75rem);
      border-top: 1px solid var(--fv-footer-line);
    }

    .site-footer__legal {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
      font-size: 0.8125rem;
      color: var(--fv-footer-faint);
    }

    .site-footer__legal a {
      color: var(--fv-footer-faint);
      text-decoration: none;
      transition: color 0.18s ease;
    }

    .site-footer__legal a:hover,
    .site-footer__legal a:focus-visible {
      color: var(--fv-white);
      outline: none;
    }

    .site-footer__social {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .site-footer__social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--fv-footer-line);
      color: var(--fv-footer-muted);
      background: rgba(255, 255, 255, 0.04);
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .site-footer__social a:hover,
    .site-footer__social a:focus-visible {
      background: var(--fv-teal);
      border-color: var(--fv-teal);
      color: var(--fv-navy);
      transform: translateY(-2px);
      outline: none;
    }

    .site-footer__social svg {
      width: 18px;
      height: 18px;
    }

    /* — Responsive — */
    @media (max-width: 960px) {
      .site-footer__top {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }

      .site-footer__nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 2rem;
      }
    }

    @media (max-width: 560px) {
      .site-footer__inner {
        padding: 3rem 1.15rem 1.5rem;
      }

      .site-footer__nav {
        grid-template-columns: 1fr;
        gap: 1.75rem;
      }

      .site-footer__bottom {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
